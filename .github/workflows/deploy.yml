name: Deploy to GitHub Pages
on:
  push:
    branches: [master]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          GHPAGES_BASE: '/worldcup26-48130'
      - name: Prepare gh-pages
        run: |
          mkdir -p gh-pages/_next
          cp .next/server/app/*.html gh-pages/ 2>/dev/null || true
          cp .next/server/app/**/*.html gh-pages/ 2>/dev/null || true
          cp -r .next/static gh-pages/_next/static
          cp -r public/. gh-pages/ 2>/dev/null || true
          touch gh-pages/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
