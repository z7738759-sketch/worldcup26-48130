name: Deploy to GitHub Pages
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: |
          mkdir -p gh-pages
          cp .next/server/app/*.html gh-pages/
          cp .next/server/app/**/*.html gh-pages/ 2>/dev/null || true
          cp -r .next/static gh-pages/_next/static
          cp public/* gh-pages/ 2>/dev/null || true
          touch gh-pages/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
